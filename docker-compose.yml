services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product_catalog_app
    restart: unless-stopped
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: product_catalog_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: product_catalog_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: product_catalog
      MYSQL_USER: product_user
      MYSQL_PASSWORD: product_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: product_catalog_redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  mysql_data: